<!DOCTYPE html>
<html>
<head>
    <title>Good Night ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            text-align: center;
        }

        img {
            max-width: 100%;
            max-height: 100vh;
            border-radius: 10px;
        }

 .text {
    position: absolute;
    top: 50px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 35px;
    font-weight: bold;
    text-shadow: 0 0 10px white, 0 0 20px red;
}
        @keyframes floatUp {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-100vh);
        opacity: 0;
    }
}
        .btn {
    position: absolute;
    bottom: 50px;
    padding: 12px 20px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: pink;
    color: black;
    cursor: pointer;
}
        .message {
    display: none;
    white-space: pre-line; /* 👈 enables \n line break */
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 20px 30px;
    border-radius: 10px;
    font-size: 24px;
    text-align: center;
}
        .highlight {
    color: #ff4d6d;
    font-weight: bold;
    font-size: 30px;
    text-shadow: 0 0 10px #ff4d6d, 0 0 20px pink;
}
    </style>
</head>
    <script>
function showMessage() {
    document.getElementById("messageBox").style.display = "block";
}
</script>
<body>

<div class="container">
    <!-- Replace this with your uploaded image link -->
    <img src="Samp0703.jpeg" alt="Good Night Image">

    <div class="text">
        Good Night ❤️<br>
     Sweet Dreams Love 🌙
    </div>
</div>
    <button onclick="showMessage()" class="btn">
    See me 💖
</button>

        <div id="messageBox" class="message">
    <span id="typingText"></span>
</div>
    <script>
function createHeart() {
    const heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.style.position = "fixed";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = "100vh";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";
    heart.style.animation = "floatUp 3s linear";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 3000);
}

setInterval(createHeart, 500);
</script>
    <script>
const text = "I Love You ❤️\n\nI Miss You 💖\n\n Take care 🌙✨";
let index = 0;

function showMessage() {
    let msgBox = document.getElementById("messageBox");
    msgBox.style.display = "block";

    let typing = document.getElementById("typingText");
    typing.innerHTML = "";

    index = 0;
    typeEffect();
}

function typeEffect() {
    if (index < text.length) {
        let currentText = text.substring(0, index + 1);

        // Highlight I MISS YOU
        currentText = currentText.replace(
            "I Miss You 💖",
            "<span class='highlight'>I Miss You 💖</span>"
        );

        document.getElementById("typingText").innerHTML = currentText;
        index++;
        setTimeout(typeEffect, 60);
    }
}
</script>

</body>
</html>
