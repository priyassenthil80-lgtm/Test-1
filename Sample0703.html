<!DOCTYPE html>
<html>
<head>
    <title>Good Night ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            text-align: center;
        }

        img {
            max-width: 100%;
            max-height: 100vh;
            border-radius: 10px;
        }

 .text {
    position: absolute;
    top: 50px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 35px;
    font-weight: bold;
    text-shadow: 0 0 10px white, 0 0 20px pink;
}
        @keyframes floatUp {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-100vh);
        opacity: 0;
    }
}
        .btn {
    position: absolute;
    bottom: 40px;
    padding: 12px 20px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: pink;
    color: black;
    cursor: pointer;
}

.message {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 20px 30px;
    border-radius: 10px;
    font-size: 24px;
    text-align: center;
}
    </style>
</head>
    <script>
function showMessage() {
    document.getElementById("messageBox").style.display = "block";
}
</script>
<body>

<div class="container">
    <!-- Replace this with your uploaded image link -->
    <img src="Samp0703.jpeg" alt="Good Night Image">

    <div class="text">
        Good Night ❤️<br>
     Sweet Dreams Love 🌙
    </div>
</div>
    <button onclick="showMessage()" class="btn">
    Me 💖
</button>
    <div id="messageBox" class="message">
    Miss you ❤️<br>
</div>
    <script>
function createHeart() {
    const heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.style.position = "fixed";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = "100vh";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";
    heart.style.animation = "floatUp 3s linear";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 3000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
